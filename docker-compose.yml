services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_competence
      POSTGRES_USER: agent_competence
      POSTGRES_PASSWORD: agent_competence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
